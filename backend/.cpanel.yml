---
deployment:
  tasks:
    # Dynamically get the current cPanel username
    - export CPANEL_USER=$(whoami)
    - export PUBLIC_HTML=/home/$CPANEL_USER/public_html
    - export BACKEND_DIR=/home/$CPANEL_USER/backend
    
    # Include cPanel's Node.js binary in path (Change 20 to 18 if using Node 18.x)
    - export PATH=/opt/cpanel/ea-nodejs20/bin:$PATH
    
    # Ensure deployment directories exist
    - mkdir -p $PUBLIC_HTML
    - mkdir -p $BACKEND_DIR
    
    # 1. Build and Deploy Frontend
    - cd frontend
    - npm install
    - npm run build
    - /bin/cp -R dist/* $PUBLIC_HTML/
    
    # 2. Deploy Backend
    - cd ../backend
    - /bin/cp -R * $BACKEND_DIR/
    - cd $BACKEND_DIR
    - npm install --production
    - mkdir -p tmp
    - touch tmp/restart.txt